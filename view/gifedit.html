<body>
    <div class="container">
        <h1>🎨 GIF头像挂件编辑器</h1>
        <div class="main-content">
            <div class="control-panel">
                <div class="card">
                    <div class="card-title">👤 主人物头像</div>
                    <div class="upload-area" id="avatarUpload">
                        <div class="upload-icon">📤</div>
                        <div class="upload-text">点击上传主人物<br>支持 PNG、JPG、GIF</div>
                        <input type="file" class="upload-input" id="avatarInput" accept="image/*,.gif" multiple>
                    </div>
                    <div class="item-counter" id="avatarCounter">已上传: 0 个</div>
                    <div class="option-group">
                        <label class="option-label">
                            <input type="checkbox" id="circleMode">
                            设置为圆形头像
                        </label>
                    </div>
                </div>
                <div class="card">
                    <div class="card-title">🖼️ 头像挂件/边框</div>
                    <div class="upload-area" id="frameUpload">
                        <div class="upload-icon">📤</div>
                        <div class="upload-text">点击上传挂件<br>支持 PNG、JPG、GIF</div>
                        <input type="file" class="upload-input" id="frameInput" accept="image/*,.gif" multiple>
                    </div>
                    <div class="item-counter" id="frameCounter">已上传: 0 个</div>
                </div>
                <div class="card">
                    <div class="card-title">⚙️ 操作</div>
                    <button class="btn btn-delete" id="deleteBtn" disabled>🗑️ 删除选中项</button>
                    <button class="btn btn-download" id="downloadBtn" disabled>📥 下载 GIF</button>
                    <div class="progress-container" id="progressContainer">
                        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                        <div class="progress-text" id="progressText">正在生成 GIF...</div>
                    </div>
                    <div class="tips">
                        <div class="tips-title">💡 使用提示：</div>
                        <ul style="margin-left: 12px; margin-top: 3px; font-size: 0.7rem;">
                            <li>拖拽调整位置</li>
                            <li>拖动角落调整大小</li>
                            <li>方向键微调位置</li>
                            <li>+/- 键或滚轮缩放</li>
                            <li>右键菜单更多操作</li>
                        </ul>
                    </div>
                </div>
            </div>
            <div class="result-area">
                <div class="result-title">✨ 合成区域 (300×300)</div>
                <div class="canvas-container" id="canvasContainer"></div>
            </div>
        </div>
    </div>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"><div class="spinner"></div><div>正在处理中...</div></div>
    </div>
    
    <div class="context-menu" id="contextMenu">
        <div class="context-menu-item" data-action="top">⬆️ 置为顶层</div>
        <div class="context-menu-item" data-action="bottom">⬇️ 置为底层</div>
        <div class="context-menu-item" data-action="up">🔼 上移一层</div>
        <div class="context-menu-item" data-action="down">🔽 下移一层</div>
        <div class="context-menu-divider"></div>
        <div class="context-menu-item danger" data-action="delete">🗑️ 删除</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
    <script src="https://unpkg.com/omggif@1.0.10/omggif.js"></script>
    <script>
        const avatarInput = document.getElementById('avatarInput');
        const frameInput = document.getElementById('frameInput');
        const avatarUpload = document.getElementById('avatarUpload');
        const frameUpload = document.getElementById('frameUpload');
        const canvasContainer = document.getElementById('canvasContainer');
        const downloadBtn = document.getElementById('downloadBtn');
        const deleteBtn = document.getElementById('deleteBtn');
        const circleMode = document.getElementById('circleMode');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const avatarCounter = document.getElementById('avatarCounter');
        const frameCounter = document.getElementById('frameCounter');

        let items = [];
        let selectedItem = null;
        let itemIdCounter = 0;
        let currentDrag = null;
        let currentResize = null;
        let startX = 0, startY = 0, startWidth = 0, startHeight = 0, startLeft = 0, startTop = 0;
        let maxZIndex = 1;

        const contextMenu = document.getElementById('contextMenu');
        let contextMenuItem = null;

        function hideContextMenu() {
            contextMenu.classList.remove('show');
        }

        document.addEventListener('click', (e) => {
            if (!contextMenu.contains(e.target)) {
                hideContextMenu();
                contextMenuItem = null;
            }
        });

        contextMenu.addEventListener('click', (e) => {
            e.stopPropagation();
            e.preventDefault();
            
            const menuItem = e.target.closest('.context-menu-item');
            if (!menuItem) return;
            
            const action = menuItem.dataset.action;
            const item = contextMenuItem;
            
            if (!item || !item.element || !action) return;
            if (!document.body.contains(item.element)) return;
            
            const el = item.element;
            const currentZ = parseInt(el.style.zIndex) || 1;
            
            switch (action) {
                case 'delete':
                    if (item.animationInterval) clearInterval(item.animationInterval);
                    el.remove();
                    items = items.filter(i => i.id !== item.id);
                    if (selectedItem === item) selectItem(null);
                    updateCounters();
                    break;
                case 'top':
                    maxZIndex++;
                    el.style.zIndex = maxZIndex;
                    break;
                case 'bottom': {
                    const allZ = items.map(i => parseInt(i.element.style.zIndex) || 1);
                    const minZ = Math.min(...allZ);
                    if (minZ <= 1) {
                        items.forEach(it => {
                            it.element.style.zIndex = (parseInt(it.element.style.zIndex) || 1) + 1;
                        });
                        el.style.zIndex = 1;
                        maxZIndex++;
                    } else {
                        el.style.zIndex = minZ - 1;
                    }
                    break;
                }
                case 'up':
                    el.style.zIndex = currentZ + 1;
                    if (currentZ + 1 > maxZIndex) maxZIndex = currentZ + 1;
                    break;
                case 'down': {
                    if (currentZ <= 1) {
                        items.forEach(it => {
                            it.element.style.zIndex = (parseInt(it.element.style.zIndex) || 1) + 1;
                        });
                        el.style.zIndex = 1;
                        maxZIndex++;
                    } else {
                        el.style.zIndex = currentZ - 1;
                    }
                    break;
                }
            }
            hideContextMenu();
            contextMenuItem = null;
        });

        function setupUploadArea(uploadArea, input) {
            uploadArea.addEventListener('click', () => input.click());
        }
        setupUploadArea(avatarUpload, avatarInput);
        setupUploadArea(frameUpload, frameInput);

        async function parseGif(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = async (e) => {
                    try {
                        const arrayBuffer = e.target.result;
                        const data = new Uint8Array(arrayBuffer);
                        const gr = new GifReader(data);
                        const width = gr.width;
                        const height = gr.height;
                        const numFrames = gr.numFrames();
                        
                        if (numFrames <= 1) {
                            const img = new Image();
                            img.onload = () => resolve({ isGif: false, img, width, height, frames: [img], delays: [100] });
                            img.onerror = reject;
                            img.src = URL.createObjectURL(new Blob([data], { type: 'image/gif' }));
                            return;
                        }
                        
                        const frames = [];
                        const delays = [];
                        const tempCanvas = document.createElement('canvas');
                        tempCanvas.width = width;
                        tempCanvas.height = height;
                        const tempCtx = tempCanvas.getContext('2d');
                        let prevImageData = null;
                        
                        for (let i = 0; i < numFrames; i++) {
                            const frameInfo = gr.frameInfo(i);
                            const imageData = new Uint8Array(width * height * 4);
                            gr.decodeAndBlitFrameRGBA(i, imageData);
                            
                            const canvas = document.createElement('canvas');
                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            
                            if (frameInfo.disposal === 2 && prevImageData) {
                                ctx.putImageData(prevImageData, 0, 0);
                            } else if (prevImageData && i > 0) {
                                ctx.drawImage(frames[i - 1], 0, 0);
                            }
                            
                            const imgData = new ImageData(new Uint8ClampedArray(imageData), width, height);
                            ctx.putImageData(imgData, 0, 0);
                            prevImageData = ctx.getImageData(0, 0, width, height);
                            
                            frames.push(canvas);
                            delays.push(frameInfo.delay * 10);
                        }
                        
                        console.log('Parsed GIF:', numFrames, 'frames');
                        resolve({ isGif: true, frames, delays, width, height });
                    } catch (err) {
                        console.error('GIF parse error:', err);
                        const img = new Image();
                        img.onload = () => resolve({ isGif: false, img, width: img.width, height: img.height, frames: [img], delays: [100] });
                        img.onerror = reject;
                        img.src = URL.createObjectURL(file);
                    }
                };
                reader.readAsArrayBuffer(file);
            });
        }

        function updateCounters() {
            const avatarCount = items.filter(i => i.type === 'avatar').length;
            const frameCount = items.filter(i => i.type === 'frame').length;
            avatarCounter.textContent = `已上传: ${avatarCount} 个`;
            frameCounter.textContent = `已上传: ${frameCount} 个`;
            downloadBtn.disabled = items.length === 0;
        }

        function selectItem(item) {
            if (selectedItem) selectedItem.element.classList.remove('selected');
            selectedItem = item;
            if (item) {
                item.element.classList.add('selected');
                deleteBtn.disabled = false;
            } else {
                deleteBtn.disabled = true;
            }
        }

        canvasContainer.addEventListener('click', (e) => {
            if (e.target === canvasContainer) selectItem(null);
        });

        async function handleImageUpload(input, type) {
            const files = input.files;
            if (!files || files.length === 0) return;
            loadingOverlay.classList.add('active');
            
            for (const file of files) {
                try {
                    const imgData = await parseGif(file);
                    createDraggableItem(imgData, type);
                } catch (err) {
                    console.error('Error loading image:', err);
                }
            }
            
            loadingOverlay.classList.remove('active');
            input.value = '';
            updateCounters();
        }

        function createDraggableItem(imgData, type) {
            const containerRect = canvasContainer.getBoundingClientRect();
            const containerSize = Math.min(containerRect.width, containerRect.height);
            const scale = Math.min(containerSize * 0.8 / imgData.width, containerSize * 0.8 / imgData.height);
            const displayWidth = imgData.width * scale;
            const displayHeight = imgData.height * scale;
            
            const item = document.createElement('div');
            item.className = 'draggable-item';
            if (type === 'avatar' && circleMode.checked) item.classList.add('circle-mode');
            
            const layerInfo = document.createElement('div');
            layerInfo.className = 'layer-info';
            layerInfo.textContent = type === 'avatar' ? '主人物' : '挂件';
            item.appendChild(layerInfo);
            
            const img = document.createElement('img');
            img.src = imgData.isGif ? imgData.frames[0].toDataURL() : imgData.img.src;
            item.appendChild(img);
            
            ['top-left', 'top-right', 'bottom-left', 'bottom-right'].forEach(pos => {
                const handle = document.createElement('div');
                handle.className = `resize-handle ${pos}`;
                handle.dataset.handle = pos;
                item.appendChild(handle);
            });
            
            item.style.width = displayWidth + 'px';
            item.style.height = displayHeight + 'px';
            item.style.left = (containerRect.width - displayWidth) / 2 + 'px';
            item.style.top = (containerRect.height - displayHeight) / 2 + 'px';
            maxZIndex++;
            item.style.zIndex = maxZIndex;
            
            canvasContainer.appendChild(item);
            
            const itemData = { id: itemIdCounter++, element: item, type, imgData, currentFrame: 0 };
            items.push(itemData);
            
            if (imgData.isGif && imgData.frames.length > 1) {
                itemData.animationInterval = setInterval(() => {
                    itemData.currentFrame = (itemData.currentFrame + 1) % imgData.frames.length;
                    img.src = imgData.frames[itemData.currentFrame].toDataURL();
                }, imgData.delays[itemData.currentFrame] || 100);
            }
            
            item.addEventListener('mousedown', (e) => {
                e.stopPropagation();
                selectItem(itemData);
                handleMouseDown(e, item);
            });
            
            item.addEventListener('touchstart', (e) => {
                e.stopPropagation();
                selectItem(itemData);
                const touch = e.touches[0];
                handleMouseDown({ clientX: touch.clientX, clientY: touch.clientY, target: e.target, preventDefault: () => e.preventDefault() }, item);
            });
            
            item.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                e.stopPropagation();
                selectItem(itemData);
                contextMenuItem = itemData;
                contextMenu.style.left = e.clientX + 'px';
                contextMenu.style.top = e.clientY + 'px';
                contextMenu.classList.add('show');
            });
            
            selectItem(itemData);
        }

        avatarInput.addEventListener('change', () => handleImageUpload(avatarInput, 'avatar'));
        frameInput.addEventListener('change', () => handleImageUpload(frameInput, 'frame'));

        circleMode.addEventListener('change', () => {
            items.filter(i => i.type === 'avatar').forEach(item => {
                if (circleMode.checked) item.element.classList.add('circle-mode');
                else item.element.classList.remove('circle-mode');
            });
        });

        deleteBtn.addEventListener('click', () => {
            if (selectedItem) {
                if (selectedItem.animationInterval) {
                    clearInterval(selectedItem.animationInterval);
                }
                selectedItem.element.remove();
                items = items.filter(i => i.id !== selectedItem.id);
                selectItem(null);
                updateCounters();
            }
        });

        function handleMouseDown(e, item) {
            if (e.target.classList.contains('resize-handle')) {
                currentResize = { item, handle: e.target.dataset.handle };
                const rect = item.getBoundingClientRect();
                startWidth = rect.width;
                startHeight = rect.height;
                startLeft = parseFloat(item.style.left);
                startTop = parseFloat(item.style.top);
            } else {
                currentDrag = item;
                const rect = item.getBoundingClientRect();
                startX = e.clientX - rect.left;
                startY = e.clientY - rect.top;
            }
            e.preventDefault();
        }

        document.addEventListener('mousemove', (e) => {
            const containerRect = canvasContainer.getBoundingClientRect();
            if (currentDrag) {
                currentDrag.style.left = (e.clientX - containerRect.left - startX) + 'px';
                currentDrag.style.top = (e.clientY - containerRect.top - startY) + 'px';
            }
            if (currentResize) {
                const item = currentResize.item;
                const aspectRatio = startWidth / startHeight;
                let newWidth, newHeight, newLeft = startLeft, newTop = startTop;
                
                if (currentResize.handle === 'bottom-right') {
                    newWidth = e.clientX - containerRect.left - startLeft;
                    newHeight = newWidth / aspectRatio;
                } else if (currentResize.handle === 'bottom-left') {
                    newWidth = startLeft + startWidth - (e.clientX - containerRect.left);
                    newHeight = newWidth / aspectRatio;
                    newLeft = e.clientX - containerRect.left;
                } else if (currentResize.handle === 'top-right') {
                    newWidth = e.clientX - containerRect.left - startLeft;
                    newHeight = newWidth / aspectRatio;
                    newTop = startTop + startHeight - newHeight;
                } else if (currentResize.handle === 'top-left') {
                    newWidth = startLeft + startWidth - (e.clientX - containerRect.left);
                    newHeight = newWidth / aspectRatio;
                    newLeft = e.clientX - containerRect.left;
                    newTop = startTop + startHeight - newHeight;
                }
                
                if (newWidth > 30 && newHeight > 30) {
                    item.style.width = newWidth + 'px';
                    item.style.height = newHeight + 'px';
                    item.style.left = newLeft + 'px';
                    item.style.top = newTop + 'px';
                }
            }
        });

        document.addEventListener('mouseup', () => { currentDrag = null; currentResize = null; });

        document.addEventListener('touchmove', (e) => {
            if (currentDrag || currentResize) {
                const touch = e.touches[0];
                const containerRect = canvasContainer.getBoundingClientRect();
                if (currentDrag) {
                    currentDrag.style.left = (touch.clientX - containerRect.left - startX) + 'px';
                    currentDrag.style.top = (touch.clientY - containerRect.top - startY) + 'px';
                }
            }
        });

        document.addEventListener('touchend', () => { currentDrag = null; currentResize = null; });

        async function generateGif() {
            if (items.length === 0) { alert('请先上传图片'); return; }
            
            progressContainer.classList.add('active');
            progressFill.style.width = '0%';
            progressText.textContent = '正在准备...';
            await new Promise(r => setTimeout(r, 50));
            
            const containerRect = canvasContainer.getBoundingClientRect();
            const size = Math.min(800, Math.max(containerRect.width, containerRect.height));
            const scale = size / containerRect.width;
            
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = size;
            tempCanvas.height = size;

                case 'ArrowRight': el.style.left = (left + step) + 'px'; e.preventDefault(); break;
                case 'ArrowUp': el.style.top = (top - step) + 'px'; e.preventDefault(); break;
                case 'ArrowDown': el.style.top = (top + step) + 'px'; e.preventDefault(); break;
            }
        });

        function scaleItem(el, factor) {
            const currentWidth = el.offsetWidth;
            const currentHeight = el.offsetHeight;
            const currentLeft = parseFloat(el.style.left) || 0;
            const currentTop = parseFloat(el.style.top) || 0;
            
            const newWidth = currentWidth * factor;
            const newHeight = currentHeight * factor;
            
            if (newWidth < 20 || newHeight < 20) return;
            if (newWidth > 600 || newHeight > 600) return;
            
            const centerX = currentLeft + currentWidth / 2;
            const centerY = currentTop + currentHeight / 2;
            
            el.style.width = newWidth + 'px';
            el.style.height = newHeight + 'px';
            el.style.left = (centerX - newWidth / 2) + 'px';
            el.style.top = (centerY - newHeight / 2) + 'px';
        }

        canvasContainer.addEventListener('wheel', (e) => {
            if (!selectedItem) return;
            e.preventDefault();
            const factor = e.deltaY > 0 ? 0.95 : 1.05;
            scaleItem(selectedItem.element, factor);
        }, { passive: false });
    </script>
</body>
</html>
