##
## Cloudflare Pages 配置文件
##
name = "znote"
account_id = "9dea4d4c91be88e92ffe5a553a0d6980"
workers_dev = false
compatibility_date = "2026-03-03"

[build]
## 构建命令说明：
##
## 问题背景：
##   Cloudflare Pages 默认使用浅克隆 (shallow clone)，只获取最近一次 commit。
##   VuePress 的 lastUpdated 功能依赖 git log 获取每个文件的真实最后修改时间，
##   浅克隆会导致所有文件的"上次更新时间"都变成构建时间。
##
## 解决方案：
##   在构建前获取完整的 Git 历史，确保 VuePress 能正确读取每个文件的最后提交时间。
##
## 命令解析：
##   git fetch --unshallow     - 将浅克隆转换为完整克隆（获取所有历史）
##   2>/dev/null               - 静默错误输出（非浅克隆时此命令会失败，属正常情况）
##   || git fetch --depth=100000  - 如果 unshallow 失败，尝试获取最大深度的历史
##   || true                   - 确保即使 git fetch 失败也继续执行（兼容性保障）
##   && npm run build          - 最后执行 VuePress 构建
##
## 参考：
##   - GitHub Actions 已配置 fetch-depth: 0 获取完整历史
##   - Cloudflare Pages 无此配置项，需在构建命令中手动处理
##
command = "git fetch --unshallow 2>/dev/null || git fetch --depth=100000 2>/dev/null || true && npm run build"
cwd = "."

[assets]
directory = "docs/.vuepress/dist"

[pages]
### Cloudflare Page 如果有根路径问题，使用重定向解决 ###
#
# 1. 登录 Cloudflare 控制台
# 2. 选择您的域名
# 3. 点击 "Rules" → "Page Rules"
# 4. 创建重定向规则 ：
#   - URL Pattern : `https://yourdomain.com/znote/*`
#   - Forwarding URL → 301 Redirect
#   - Destination URL : `https://yourdomain.com/${1}`

[env]
